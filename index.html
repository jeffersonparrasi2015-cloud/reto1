<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Feedback Alegra</title>
  <style>
    body {
      font-family: 'Segoe UI';
      background: linear-gradient(135deg, #667eea, #764ba2);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: white;
      padding: 25px;
      border-radius: 12px;
      width: 360px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    h2 {
      text-align: center;
    }

    input, select, textarea {
      width: 100%;
      margin-top: 10px;
      padding: 10px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      margin-top: 15px;
      padding: 12px;
      border-radius: 6px;
      border: none;
      background: #667eea;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #5a67d8;
    }

    .loader {
      text-align: center;
      display: none;
      margin-top: 10px;
    }

    .mensaje {
      text-align: center;
      margin-top: 10px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="container">
  <h2>💬 Enviar Feedback</h2>

  <input type="text" id="nombre" placeholder="Nombre (opcional)">

  <select id="producto">
    <option value="">Seleccione producto</option>
    <option>Alegra POS</option>
    <option>Alegra Contabilidad</option>
    <option>Alegra Nómina</option>
  </select>

  <textarea id="comentario" placeholder="Escribe tu comentario"></textarea>

  <button onclick="enviarFeedback()">Enviar</button>

  <div class="loader" id="loader">⏳ Enviando...</div>
  <div class="mensaje" id="mensaje"></div>
</div>

<script>
function enviarFeedback() {
  const nombre = document.getElementById("nombre").value.trim();
  const producto = document.getElementById("producto").value;
  const comentario = document.getElementById("comentario").value.trim();

  const mensaje = document.getElementById("mensaje");
  const loader = document.getElementById("loader");

  if (!producto || comentario.length < 5) {
    mensaje.innerText = "⚠️ Completa los campos correctamente";
    mensaje.style.color = "red";
    return;
  }

  const data = { nombre, producto, comentario }; // ✅ FALTABA ESTO

  loader.style.display = "block";
  mensaje.innerText = "";

  fetch("https://script.google.com/macros/s/AKfycbzLVgGqdOKR5IN0NAWvOTxPY11LgR4mSDqZJZeP2uIyT_Ske2W3VzixQujRGv3bQ93r5w/exec", {
    method: "POST",
    mode: "no-cors",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(data)
  })
  .then(() => { // ⚠️ NO usamos res.json()
    loader.style.display = "none";
    mensaje.innerText = "✅ ¡Feedback enviado!";
    mensaje.style.color = "green";
  })
  .catch(error => {
    loader.style.display = "none";
    mensaje.innerText = "❌ Error de conexión";
    mensaje.style.color = "red";
    console.error(error);
  });
}
</script>

</body>
</html>
